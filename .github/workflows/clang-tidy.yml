name: Static Analysis (clang-tidy)

on:
  schedule:
    - cron: '0 3 */2 * *'
  workflow_dispatch:

jobs:
  clang-tidy:
    name: clang-tidy report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: loxpp-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure (debug)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            loxpp-dev:latest \
            bash -c "cmake --preset debug"

      - name: Run clang-tidy
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            loxpp-dev:latest \
            bash -c "run-clang-tidy -p build -j\$(nproc) 'src/.*\.cpp' 2>&1" \
            > clang_tidy_output.txt || true

      - name: Generate report
        run: python3 tools/clang_tidy_report.py clang_tidy_output.txt >> $GITHUB_STEP_SUMMARY

      - name: Fail on errors
        run: |
          if grep -qE ":\s+error:" clang_tidy_output.txt; then
            echo "clang-tidy reported errors — see the Job Summary for details."
            exit 1
          fi
